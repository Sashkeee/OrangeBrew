<svg width="680" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="820" fill="#0F0F0F"/>

  <!-- ЗОНА: Регистрация -->
  <rect x="40" y="20" width="600" height="44" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#D3D1C7" x="340" y="42" text-anchor="middle" dominant-baseline="central">Регистрация</text>

  <line x1="340" y1="64" x2="340" y2="94" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 1: Открыл сайт -->
  <rect x="220" y="94" width="240" height="56" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="114" text-anchor="middle" dominant-baseline="central">Открыл сайт</text>
  <text font-family="sans-serif" font-size="12" fill="#AFA9EC" x="340" y="134" text-anchor="middle" dominant-baseline="central">test.orangebrew.ru</text>

  <line x1="340" y1="150" x2="340" y2="180" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 2: Регистрация -->
  <rect x="220" y="180" width="240" height="56" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="200" text-anchor="middle" dominant-baseline="central">Форма регистрации</text>
  <text font-family="sans-serif" font-size="12" fill="#AFA9EC" x="340" y="220" text-anchor="middle" dominant-baseline="central">username, email, password</text>

  <!-- Ошибка регистрации -->
  <rect x="504" y="180" width="136" height="56" rx="8" fill="#791F1F" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#F7C1C1" x="572" y="200" text-anchor="middle" dominant-baseline="central">Ошибка</text>
  <text font-family="sans-serif" font-size="12" fill="#F09595" x="572" y="220" text-anchor="middle" dominant-baseline="central">Username занят</text>
  <line x1="460" y1="208" x2="504" y2="208" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="340" y1="236" x2="340" y2="266" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 3: Вошёл -->
  <rect x="220" y="266" width="240" height="44" rx="8" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#CECBF6" x="340" y="288" text-anchor="middle" dominant-baseline="central">Вошёл в систему</text>

  <line x1="340" y1="310" x2="340" y2="340" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ЗОНА: Устройство -->
  <rect x="40" y="340" width="600" height="44" rx="8" fill="#2C2C2A" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#D3D1C7" x="340" y="362" text-anchor="middle" dominant-baseline="central">Настройка устройства (ESP32)</text>

  <line x1="340" y1="384" x2="340" y2="414" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 4: Купил -->
  <rect x="220" y="414" width="240" height="56" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="340" y="434" text-anchor="middle" dominant-baseline="central">Купил устройство</text>
  <text font-family="sans-serif" font-size="12" fill="#5DCAA5" x="340" y="454" text-anchor="middle" dominant-baseline="central">OrangeBrew ESP32</text>

  <line x1="340" y1="470" x2="340" y2="500" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 5: WiFi -->
  <rect x="220" y="500" width="240" height="56" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="340" y="520" text-anchor="middle" dominant-baseline="central">Настройка WiFi</text>
  <text font-family="sans-serif" font-size="12" fill="#5DCAA5" x="340" y="540" text-anchor="middle" dominant-baseline="central">Вводит SSID + пароль</text>

  <!-- Ошибка WiFi -->
  <rect x="504" y="500" width="136" height="56" rx="8" fill="#791F1F" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#F7C1C1" x="572" y="520" text-anchor="middle" dominant-baseline="central">Ошибка</text>
  <text font-family="sans-serif" font-size="12" fill="#F09595" x="572" y="540" text-anchor="middle" dominant-baseline="central">WiFi недоступен</text>
  <line x1="460" y1="528" x2="504" y2="528" stroke="#E24B4A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="340" y1="556" x2="340" y2="586" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 6: Pairing code -->
  <rect x="220" y="586" width="240" height="56" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="340" y="606" text-anchor="middle" dominant-baseline="central">Получил pairing code</text>
  <text font-family="sans-serif" font-size="12" fill="#5DCAA5" x="340" y="626" text-anchor="middle" dominant-baseline="central">6-символьный код в браузере</text>

  <line x1="340" y1="642" x2="340" y2="672" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Шаг 7: Ввод кода -->
  <rect x="220" y="672" width="240" height="56" rx="8" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#9FE1CB" x="340" y="692" text-anchor="middle" dominant-baseline="central">Ввёл код на устройстве</text>
  <text font-family="sans-serif" font-size="12" fill="#5DCAA5" x="340" y="712" text-anchor="middle" dominant-baseline="central">ESP32 получает api_key</text>

  <line x1="340" y1="728" x2="340" y2="758" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Финал -->
  <rect x="200" y="758" width="280" height="44" rx="8" fill="#173404" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" fill="#C0DD97" x="340" y="780" text-anchor="middle" dominant-baseline="central">Устройство подключено</text>

  <!-- Легенда -->
  <rect x="42" y="778" width="12" height="12" rx="2" fill="#3C3489" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="60" y="788">Регистрация</text>
  <rect x="42" y="798" width="12" height="12" rx="2" fill="#085041" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="60" y="808">Устройство</text>
  <rect x="132" y="778" width="12" height="12" rx="2" fill="#791F1F" stroke="#A32D2D" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="150" y="788">Ошибка</text>
  <rect x="132" y="798" width="12" height="12" rx="2" fill="#173404" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" fill="#888780" x="150" y="808">Успех</text>
</svg>