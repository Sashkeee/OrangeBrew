# Vector log shipper — OrangeBrew Test
# Collects Docker container logs, parses pino JSON, ships to Betterstack

# ─── Source ──────────────────────────────────────────────────────────────────
[sources.docker_logs]
type               = "docker_logs"
include_containers = ["orangebrew-backend-test", "orangebrew-frontend-test"]

# ─── Transform ───────────────────────────────────────────────────────────────
[transforms.parse_and_enrich]
type   = "remap"
inputs = ["docker_logs"]
source = '''
.environment = "test"
.app         = "orangebrew"
.container   = del(.container_name)

# Remove noisy Docker metadata fields
del(.container_created_at)
del(.container_status)
del(.source_type)
del(.stream)
del(.label)

# Try to parse backend's pino JSON log from the message field
parsed, err = parse_json(.message)
if err == null && is_object(parsed) {
    # Pino uses numeric levels: 10=trace 20=debug 30=info 40=warn 50=error 60=fatal
    if exists(parsed.level) && is_integer(parsed.level) {
        level_num = to_int!(parsed.level)
        if level_num >= 60 {
            .level = "fatal"
        } else if level_num >= 50 {
            .level = "error"
        } else if level_num >= 40 {
            .level = "warn"
        } else if level_num >= 30 {
            .level = "info"
        } else if level_num >= 20 {
            .level = "debug"
        } else {
            .level = "trace"
        }

        # Pino uses "msg" or "message" key
        .msg = to_string(parsed.msg) ?? to_string(parsed.message) ?? ""

        # Betterstack timestamp from pino's .time (unix ms)
        if exists(parsed.time) {
            .dt = to_string!(parsed.time)
        }

        # Lift useful fields
        if exists(parsed.req) {
            .http_method     = to_string(parsed.req.method) ?? ""
            .http_url        = to_string(parsed.req.url) ?? ""
            .http_remoteaddr = to_string(parsed.req.remoteAddress) ?? ""
        }
        if exists(parsed.res) {
            .http_status = to_int(parsed.res.statusCode) ?? 0
        }
        if exists(parsed.module) { .module = to_string!(parsed.module) }
        if exists(parsed.userId) { .userId = to_string!(parsed.userId) }
        if exists(parsed.responseTime) { .response_time_ms = parsed.responseTime }

        # Lift heartbeat fields (from Health module)
        if exists(parsed.rssMemMb) { .rss_mem_mb = parsed.rssMemMb }
        if exists(parsed.heapUsedMb) { .heap_used_mb = parsed.heapUsedMb }
        if exists(parsed.uiClients) { .ui_clients = parsed.uiClients }
        if exists(parsed.hwClients) { .hw_clients = parsed.hwClients }
        if exists(parsed.uptime) { .uptime_sec = parsed.uptime }

        # Lift device fields (from WS/Server modules)
        if exists(parsed.deviceId) { .device_id = to_string!(parsed.deviceId) }
    } else {
        # JSON but not pino — store as-is
        .level = "info"
        .msg   = .message
    }
} else {
    # Plain text log — keep message as-is
    .level = "info"
    .msg   = .message
}
'''

# ─── Sink ─────────────────────────────────────────────────────────────────────
[sinks.betterstack]
type        = "http"
inputs      = ["parse_and_enrich"]
uri         = "https://s2297886.eu-nbg-2.betterstackdata.com"
compression = "gzip"

[sinks.betterstack.encoding]
codec = "json"

[sinks.betterstack.framing]
method = "newline_delimited"

[sinks.betterstack.auth]
strategy = "bearer"
token    = "HWuVWvojze9W3bHHR1gAmsuj"

# NOTE: request.headers must come AFTER [sinks.betterstack.request] in TOML
[sinks.betterstack.request]
retry_attempts             = 5
retry_initial_backoff_secs = 1
timeout_secs               = 30

[sinks.betterstack.request.headers]
Content-Type = "application/json"
