services:
  backend-test:
    image: ghcr.io/sashkeee/orangebrew/backend-test:latest
    container_name: orangebrew-backend-test
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - DB_PATH=/app/data/orangebrew.db
      - CONNECTION_TYPE=mock
      - NODE_ENV=development
      - LOG_FORMAT=json
      - JWT_SECRET=${JWT_SECRET}
      - SWAGGER_ENABLED=true
    volumes:
      - orangebrew-data-test:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  frontend-test:
    image: ghcr.io/sashkeee/orangebrew/frontend-test:latest
    container_name: orangebrew-frontend-test
    ports:
      - "8081:80"
    restart: unless-stopped
    depends_on:
      - backend-test
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 512M

  vector:
    image: timberio/vector:0.43.1-alpine
    container_name: orangebrew-vector-test
    command: ["--config", "/etc/vector/vector.toml"]
    environment:
      - BETTERSTACK_TOKEN=${BETTERSTACK_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./vector.test.toml:/etc/vector/vector.toml:ro
    restart: unless-stopped
    depends_on:
      - backend-test
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M

volumes:
  orangebrew-data-test:
