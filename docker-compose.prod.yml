services:
  backend-prod:
    image: ghcr.io/sashkeee/anti-orangebrew/backend-prod:latest
    container_name: orangebrew-backend-prod
    ports:
      - "3000:3000"
    devices:
      - "/dev/ttyUSB0:/dev/ttyUSB0"
    environment:
      - PORT=3000
      - DB_PATH=/app/data/orangebrew.db
      - CONNECTION_TYPE=serial
      - SERIAL_PORT=/dev/ttyUSB0
      - BAUD_RATE=115200
      - NODE_ENV=production
    volumes:
      - orangebrew-data-prod:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G

  frontend-prod:
    image: ghcr.io/sashkeee/anti-orangebrew/frontend-prod:latest
    container_name: orangebrew-frontend-prod
    ports:
      - "8080:80"
    restart: unless-stopped
    depends_on:
      - backend-prod
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 512M

volumes:
  orangebrew-data-prod:
